<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Заметки">
<title>Заметки</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f7f7f5;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --hint: #a0a0a0;
  --border: rgba(0,0,0,0.1);
  --accent: #1D9E75;
  --accent-bg: #E1F5EE;
  --accent-text: #085041;
  --danger: #E24B4A;
  --danger-bg: #FCEBEB;
  --radius: 12px;
  --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110;
    --card: #1e1e1c;
    --text: #f0ede8;
    --muted: #a0a09a;
    --hint: #666660;
    --border: rgba(255,255,255,0.1);
    --accent-bg: #085041;
    --accent-text: #9FE1CB;
    --danger-bg: #501313;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 20; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.app-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.add-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; line-height: 1; }
.search-box { width: 100%; padding: 8px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg); font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
.search-box::placeholder { color: var(--hint); }

.cats { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 0.5px solid var(--border); background: var(--card); }
.cats::-webkit-scrollbar { display: none; }
.cat-pill { flex-shrink: 0; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; }
.cat-pill.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: 500; }

.notes-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 100px; }
.note-card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; cursor: pointer; position: relative; }
.note-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.note-title { font-size: 15px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-date { font-size: 11px; color: var(--hint); white-space: nowrap; }
.note-preview { font-size: 13px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.note-cat { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--accent-bg); color: var(--accent-text); margin-top: 6px; }
.empty { text-align: center; padding: 60px 20px; color: var(--hint); font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; display: flex; flex-direction: column; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
.sheet-title { font-size: 16px; font-weight: 500; }
.sheet-actions { display: flex; gap: 8px; }
.sh-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; font-size: 14px; font-family: inherit; cursor: pointer; color: var(--text); }
.sh-btn.primary { background: var(--accent); color: white; border-color: var(--accent); font-weight: 500; }
.sh-btn.danger { color: var(--danger); border-color: var(--danger); }
.sheet-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.field-label { font-size: 12px; color: var(--hint); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
.field-input { width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg); font-size: 15px; font-family: inherit; color: var(--text); outline: none; font-weight: 500; }
.field-input:focus { border-color: var(--accent); }
.field-textarea { width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg); font-size: 14px; font-family: inherit; color: var(--text); outline: none; resize: none; min-height: 180px; line-height: 1.6; }
.field-textarea:focus { border-color: var(--accent); }
.cat-select { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-opt { padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; }
.cat-opt.selected { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); font-weight: 500; }
.count-bar { background: var(--card); border-top: 0.5px solid var(--border); padding: 10px 16px; text-align: center; font-size: 12px; color: var(--hint); position: sticky; bottom: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Заметки</div>
    <button class="add-btn" onclick="openNew()" aria-label="Новая заметка">+</button>
  </div>
  <input class="search-box" type="search" placeholder="Поиск..." id="search" oninput="renderNotes()" />
</div>

<div class="cats" id="cats-bar"></div>

<div class="notes-list" id="notes-list"></div>
<div class="count-bar" id="count-bar"></div>

<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheet-title">Новая заметка</div>
      <div class="sheet-actions">
        <button class="sh-btn danger" id="del-btn" onclick="deleteNote()" style="display:none">Удалить</button>
        <button class="sh-btn" onclick="closeSheet()">Отмена</button>
        <button class="sh-btn primary" onclick="saveNote()">Сохранить</button>
      </div>
    </div>
    <div class="sheet-body">
      <div>
        <div class="field-label">Заголовок</div>
        <input class="field-input" type="text" id="f-title" placeholder="Название заметки..." maxlength="80" />
      </div>
      <div>
        <div class="field-label">Категория</div>
        <div class="cat-select" id="cat-select"></div>
      </div>
      <div style="flex:1">
        <div class="field-label">Текст</div>
        <textarea class="field-textarea" id="f-body" placeholder="Напиши что-нибудь..."></textarea>
      </div>
    </div>
  </div>
</div>

<script>
const CATS = ['Все', 'Личное', 'Работа', 'Здоровье', 'Идеи', 'Разное'];
const EDIT_CATS = ['Личное', 'Работа', 'Здоровье', 'Идеи', 'Разное'];

let notes = JSON.parse(localStorage.getItem('iph_notes') || '[]');
let activeCat = 'Все';
let editId = null;
let selectedCat = 'Личное';

function save() { localStorage.setItem('iph_notes', JSON.stringify(notes)); }

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Только что';
  if (diff < 3600000) return Math.floor(diff/60000) + ' мин назад';
  if (diff < 86400000) return d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString('ru-RU', {weekday:'short', hour:'2-digit', minute:'2-digit'});
  return d.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
}

function renderCats() {
  const bar = document.getElementById('cats-bar');
  bar.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (c === activeCat ? ' active' : '');
    const cnt = c === 'Все' ? notes.length : notes.filter(n => n.cat === c).length;
    btn.textContent = c + (cnt > 0 ? ' ' + cnt : '');
    btn.onclick = () => { activeCat = c; renderCats(); renderNotes(); };
    bar.appendChild(btn);
  });
}

function renderNotes() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = notes.filter(n => {
    const matchCat = activeCat === 'Все' || n.cat === activeCat;
    const matchQ = !q || n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q);
    return matchCat && matchQ;
  }).sort((a,b) => b.ts - a.ts);

  const el = document.getElementById('notes-list');
  const cb = document.getElementById('count-bar');

  if (list.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📝</div>' + (notes.length === 0 ? 'Нет заметок. Нажми + чтобы создать.' : 'Ничего не найдено.') + '</div>';
    cb.textContent = '';
    return;
  }

  el.innerHTML = list.map(n => `
    <div class="note-card" onclick="openEdit('${n.id}')">
      <div class="note-top">
        <div class="note-title">${escHtml(n.title || 'Без названия')}</div>
        <div class="note-date">${formatDate(n.ts)}</div>
      </div>
      ${n.body ? `<div class="note-preview">${escHtml(n.body)}</div>` : ''}
      <span class="note-cat">${n.cat}</span>
    </div>
  `).join('');

  cb.textContent = list.length + ' ' + plural(list.length, 'заметка', 'заметки', 'заметок');
}

function plural(n, a, b, c) {
  const m = n % 100;
  if (m >= 11 && m <= 14) return c;
  const r = n % 10;
  if (r === 1) return a;
  if (r >= 2 && r <= 4) return b;
  return c;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderCatSelect() {
  const el = document.getElementById('cat-select');
  el.innerHTML = EDIT_CATS.map(c => `<button class="cat-opt${c === selectedCat ? ' selected' : ''}" onclick="pickCat('${c}')">${c}</button>`).join('');
}

function pickCat(c) {
  selectedCat = c;
  renderCatSelect();
}

function openNew() {
  editId = null;
  selectedCat = activeCat !== 'Все' ? activeCat : 'Личное';
  document.getElementById('sheet-title').textContent = 'Новая заметка';
  document.getElementById('f-title').value = '';
  document.getElementById('f-body').value = '';
  document.getElementById('del-btn').style.display = 'none';
  renderCatSelect();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 300);
}

function openEdit(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  editId = id;
  selectedCat = n.cat;
  document.getElementById('sheet-title').textContent = 'Редактировать';
  document.getElementById('f-title').value = n.title;
  document.getElementById('f-body').value = n.body;
  document.getElementById('del-btn').style.display = '';
  renderCatSelect();
  document.getElementById('overlay').classList.add('open');
}

function saveNote() {
  const title = document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  if (!title && !body) { closeSheet(); return; }
  if (editId) {
    const n = notes.find(x => x.id === editId);
    if (n) { n.title = title; n.body = body; n.cat = selectedCat; n.ts = Date.now(); }
  } else {
    notes.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), title, body, cat: selectedCat, ts: Date.now() });
  }
  save(); closeSheet(); renderCats(); renderNotes();
}

function deleteNote() {
  if (!editId) return;
  notes = notes.filter(n => n.id !== editId);
  save(); closeSheet(); renderCats(); renderNotes();
}

function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function closeIfOutside(e) { if (e.target === document.getElementById('overlay')) closeSheet(); }

renderCats();
renderNotes();
</script>
</body>
</html>
